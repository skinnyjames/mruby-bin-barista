name: deploy
on:
  push:
    tags:
    - '*'
jobs:
  compile-and-test:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-22.04-arm]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/checkout@v5
      - name: Set up Ruby 3.1
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1
      - name: build
        run: ruby setup.rb
      - name: test
        run: tmp/mruby/build/host/bin/theorize --require="mrblib/barista.rb" test
      - name: Publish dockerimages
        run: tmp/mruby/build/host/bin/barista dockerpublish
      - uses: actions/upload-artifact@v4
        with:
          name: barista-bootstrap-${{matrix.runner}}
          path: tmp/mruby/build/host/bin/barista
          overwrite: true
  publish:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-22.04-arm]
        platform: [linux, osx, windows]
    needs: compile-and-test
    services:
      docker:
        image: docker:dind
        options: --privileged --shm-size=2g
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock:ro
    runs-on: ${{matrix.runner}}
    container:
      image: ubuntu:latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: barista-bootstrap-${{matrix.runner}}
      # docker build here.
      - name: install docker
        run: |
          apt-get update -y && apt-get install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
            $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}") stable" | \
            tee /etc/apt/sources.list.d/docker.list > /dev/null
          apt-get update -y
          apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
      - name: build docker ${{matrix.platform}}
        run: export DOCKER_BUILDKIT=1 && chmod 755 barista && ./barista ${{matrix.platform}}
      - uses: actions/upload-artifact@v4
        with:
          name: barista-${{matrix.platform}}-${{matrix.runner}}
          path: platforms/${{matrix.platform}}/barista*
          overwrite: true
  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: barista*
    - name: zip artifacts
      run: |
        tar -czvf barista-linux-x86.tar.gz barista-linux-ubuntu-latest
        tar -czvf barista-osx-x86.tar.gz barista-osx-ubuntu-latest
        tar -czvf barista-windows-x86.tar.gz barista-windows-ubuntu-latest
        tar -czvf barista-linux-x86.tar.gz barista-linux-ubuntu-22.04-arm
        tar -czvf barista-osx-x86.tar.gz barista-osx-ubuntu-22.04-arm
        tar -czvf barista-windows-x86.tar.gz barista-ubuntu-22.04-arm
    - uses: ncipollo/release-action@v1
      with:
        artifacts: "barista*"
